schema_version: 1
name: hardware_mixed_ao_asg_counter
description: Template for NI slow AO setpoint plus ASG-master counter readout.
tags: [hardware, ni_sync, mixed, ao, asg_master, counter]

resources:
  asg:
    adapter: pycontrol_asg
    capabilities: [pulse_sequencer, trigger_source]
    address: auto
    pycontrol_path: drivers/pycontrol
  daq:
    adapter: pycontrol_ni
    capabilities: [analog_output, daq_counter, trigger_receiver]
    driver: sync
    device: Dev2
    pycontrol_path: drivers/pycontrol

sync:
  master: asg
  triggers:
    - source: asg.ch5
      target: daq.PFI1
      edge: rising
      purpose: counter_sample_clock
  order:
    configure: [daq, asg]
    arm: [daq, asg]
    start: [asg]
    read: [daq]

procedure:
  - scan:
      name: ao_voltage
      values: {start: -0.1, stop: 0.1, points: 3}
      body:
        - measurement:
            name: mixed_point
            body:
              - call: daq.set_ao_static
                args:
                  channel: ao0
                  voltage: ${ao_voltage}
              - call: daq.wait_settle
                args: {seconds: 0.002}
              - call: daq.configure_point_readout
                args:
                  kind: counter
                  counter_channel: ctr0
                  count_source: PFI0
                  sample_clock: PFI1
                  samples: 1000
                  sample_rate: 1000000
              - run:
                  name: pulse_readout
                  timeout_s: 5
                  steps:
                    - call: daq.arm
                    - call: asg.arm
                    - call: asg.start
                    - call: daq.read
                      save_as: counts

cleanup:
  - call: asg.stop
  - call: daq.stop
