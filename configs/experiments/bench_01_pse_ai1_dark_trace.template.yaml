schema_version: 1
name: bench_01_pse_ai1_dark_trace
description: >
  Safe read-only PSE photon detector analog input test. Connect the PSE detector
  analog output to NI AI1. This records finite AI1 traces with no laser/ASG/MW
  output generated by Qulab. Use this first to verify AI1 wiring, detector bias,
  noise floor, saturation, polarity, and voltage range.
tags: [bench, detector, pse, ni, ai1, read_only]

bench:
  stage: 01_pse_ai1_dark_trace
  safety: read_only
  requires_allow_output: false
  requires_allow_ao: false
  wiring:
    - PSE analog output -> NI Dev2/ai1.
    - PSE ground/reference -> NI AI ground/reference according to terminal configuration.
    - Optional oscilloscope CH1 in parallel on PSE analog output.
  operator_steps:
    - Keep laser/ASG/MW outputs off.
    - Verify PSE bias and gain are in the desired PSE mode.
    - Run this config and watch the AI1 trace baseline.
    - Manually block/unblock ambient light or detector input if safe to confirm response.
  expected_observation:
    - AI1 trace should remain within configured voltage range.
    - Oscilloscope CH1 should match the Qulab AI1 trace scale and polarity.
    - With detector dark, trace should show stable baseline plus noise, not rail saturation.

resources:
  daq:
    adapter: pycontrol_ni
    capabilities: [analog_input, trigger_receiver]
    driver: sync
    device: Dev2
    simulation: false
    pycontrol_path: drivers/pycontrol

sync:
  master: daq
  triggers: []
  order:
    configure: [daq]
    arm: [daq]
    start: [daq]
    read: [daq]

setup:
  - call: daq.configure_ai
    args:
      channels: [ai1]
      sample_rate: 100000
      samples: 2000
      terminal_config: DIFF

procedure:
  - average:
      name: repeat
      count: 5
      reducer: none
      body:
        - measurement:
            name: pse_ai1_dark_trace
            body:
              - run:
                  name: ai1_dark_trace
                  timeout_s: 5
                  steps:
                    - call: daq.arm
                    - call: daq.read_analog
                      save_as: pse_ai1_trace

cleanup:
  - call: daq.stop

plot:
  - type: trace
    x: time_s
    y: pse_ai1_trace

storage:
  backends: [csv]
